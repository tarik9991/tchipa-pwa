<!DOCTYPE html>

<head>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <style>
    html, body { background-color: #0D1117; margin: 0; padding: 0; }
    #splash {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #0D1117; z-index: 9999;
      transition: opacity .4s ease; }
    #splash img { width: 96px; height: 96px; }

<body>
  <div id="splash"><img src="icons/Icon-192.png" alt="Tchipa"></div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 400); }
    });
  </script>
